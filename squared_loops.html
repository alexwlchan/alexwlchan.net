<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

  <style>
    path {
      stroke: black;
      stroke-width: 1px;
      fill: none;
    }

    svg {
      border: 2px solid red;
    }
  </style>



  <script>
    function createSvgElement(name) {
      return document.createElementNS('http://www.w3.org/2000/svg', name);
    }

    function drawSymbol(N, L, r) {
      // Straight line up to the loop
      const theta = 2 * Math.PI / N;
      const h = L / (2 * Math.tan(theta / 2));

      // Curved loop
      const psi = 2 * Math.PI * (1 - 1 / N);
      const s = r * Math.tan(Math.PI - psi / 2);

      // Centre of rotation
      const maxDistance = r + Math.sqrt((L / 2 + s) ** 2 + (h + r) ** 2);

      const width = height = Math.ceil(2.2 * maxDistance);

      const centre_of_rotation_x = width / 2;
      const centre_of_rotation_y = height / 2;

      const svgElement = createSvgElement("svg");
      svgElement.setAttribute("viewBox", `0 0 ${width} ${height}`);
      svgElement.setAttribute("width", "500");

      document.querySelector("#result").innerHTML = "";
      document.querySelector("#result").appendChild(svgElement);

      const defs = createSvgElement("defs");
      svgElement.appendChild(defs);

      const start_x = centre_of_rotation_x - L / 2;
      const end_x = centre_of_rotation_x + L / 2;
      const y = centre_of_rotation_y - h;

      const pathElement = createSvgElement("path");
      pathElement.setAttribute("id", "loopedHook");
      pathElement.setAttribute(
        "d",
        `
        M ${start_x} ${y}
        L ${end_x} ${y}
        l ${s} 0
        A ${r} ${r}
        0 1 0
        ${end_x + s + r * Math.sin(psi)}
        ${y - r + r * Math.cos(psi)}
        L ${end_x} ${y}
        `
      );
      defs.appendChild(pathElement);

      for (i = 0; i < N; i++) {
        const useElement = createSvgElement("use");
        useElement.setAttribute("href", "#loopedHook");
        useElement.setAttribute("transform", `rotate(${360 / N * i}, ${centre_of_rotation_x}, ${centre_of_rotation_y})`);
        svgElement.appendChild(useElement);
      }
    }

    window.addEventListener("DOMContentLoaded", (event) => {
      drawSymbol(10, 10, 4);
    });

    function redraw() {
      const numberOfSides = Number(document.querySelector("#numberOfSides").value || 10);
      const lengthOfSide = Number(document.querySelector("#lengthOfSide").value || 10);
      const sizeOfLoops = Number(document.querySelector("#sizeOfLoops").value || 4);

      drawSymbol(
        numberOfSides, lengthOfSide, sizeOfLoops
      );
    }
  </script>
</head>

<body>
  <form>
    <label for="numberOfSides">number of sides:</label>
    <input type="number" min="3" id="numberOfSides" onChange="redraw();" default="5"/>

    <label for="lengthOfSide">length of side:</label>
    <input type="number" min="1" id="lengthOfSide" onChange="redraw();" default="10"/>

    <label for="sizeOfLoops">size of loops:</label>
    <input type="number" min="1" id="sizeOfLoops" onChange="redraw();" default="10"/>
  </form>

  <div id="result">
  </div>
</body>

</html>
