    <style>
      #graph-284 {
        --primary-color:      #8b7434;
        --primary-fill:       #f4f1ec;
        --note-border-color:  #d01c11;
        --note-fill:          #f7eae8;
        --block-border-color: #dfdfdf;
        --block-background:   #f3f3f3;
        --body-text:          #202020;
      }

      @media (prefers-color-scheme: dark) {
        #graph-284 {
          --primary-color:      #dfcf96;
          --primary-fill:       #423d2c;
          --red:                #ff4a4a;
          --note-fill:          #4b1616;
          --block-border-color: #434343;
          --block-background:   #1d1d1d;
          --body-text:          #c7c7c7;
        }
      }
      
      #graph-284 {
      	font-size: 16px;
      	fill: #333;
        
        .note {
          stroke: var(--note-border-color);
          fill: var(--note-fill);
        }
        
        text {
          text-anchor: middle;
          dominant-baseline: bottom;
          fill: var(--body-text)
        }
        
        .actor, .note {
          tspan {
            dominant-baseline: middle;
          }
        }

        .actor {
        	stroke: var(--primary-color);
        	fill:   var(--primary-fill);
        	stroke-width: 3;
        }

        text.actor {
        	fill: var(--primary-color);
        	stroke: none;
        }

        .actor-line {
        	stroke: var(--primary-color);
        }

        .messageLine0 {
        	stroke-width: 1.5;
        	stroke-dasharray: none;
        	stroke: var(--body-text);
        }

        .messageLine1 {
        	stroke-width: 1.5;
        	stroke-dasharray: 2, 2;
        	stroke: var(--body-text);
        }

        .messageText {
        	fill: var(--body-text);
        	stroke: none;
        }
        
        .noteText {
          fill: var(--note-border-color);
        }

        line {
        	fill: var(--block-background);
        	stroke-width: 2px;
        }
        
        .rebuild {
          stroke: var(--block-border-color);
          stroke-width: 2px;
          border-radius: 3px;
          fill: var(--block-background);
        }
      }
      
      #graph-284-arrowhead path {
        fill: var(--body-text);
      }
    </style>
    
