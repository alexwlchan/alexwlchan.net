<svg viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"  xmlns:xlink="http://www.w3.org/1999/xlink">
  <!-- <rect width="24" height="24" fill="yellow"/> -->
  
  <!--[[[cog
  import cog
  
  WIDTH = HEIGHT = 24
  
  book_width = 12
  book_height = 14
  
  r = 2.5
  
  x = (WIDTH - book_width - r) / 2
  y = (HEIGHT - book_height - r*2) / 2
  
  bookmark = f"""
    M 11 {y-0.5}
    a 1 1 0 0 1 1 1
     v 8 l 2 -2 l 2 2 v -8
    a 1 1 0 0 0 -1 -1
  """
  
  cog.outl(f'''
  <defs>
    <mask id="bookmarkMask">
      <rect width="24" height="24" fill="white"/>
      <path d="{bookmark}" style="stroke-width: 3; stroke: black;"/>
      <rect x="10.5" y="{y - 1}" width="4.5" height="2" style="fill: black;"/>
    </mask>
  </defs>
  ''')
  
  cog.outl(f'''
  <path class="border" d="
      M {x + book_width+r} {y}
      h -{book_width}
      a {r} {r} 0 0 0 -{r} {r}
      v {book_height}
      a {r} {r} 0 0 0 {r} {r}
      h {book_width}
  " mask="url(#bookmarkMask)"/>
  <path class="border" d="
      M {x} {y+book_height+r}
      a {r} {r} 0 0 1 {r} {-r}
      h {book_width}
  "/>
  <path class="border" d="
      M {x + book_width+r} {y}
      v {book_height}
  "/>
  <path d="
      M {x + r} {y + book_height + r}
      h {book_width}
  "/>
  <path d="{bookmark}"/>
  ''')
  ]]]-->

  <defs>
    <mask id="bookmarkMask">
      <rect width="24" height="24" fill="white"/>
      <path d="
    M 11 2.0
    a 1 1 0 0 1 1 1
     v 8 l 2 -2 l 2 2 v -8
    a 1 1 0 0 0 -1 -1
  " style="stroke-width: 3; stroke: black;"/>
      <rect x="10.5" y="1.5" width="4.5" height="2" style="fill: black;"/>
    </mask>
  </defs>


  <path class="border" d="
      M 19.25 2.5
      h -12
      a 2.5 2.5 0 0 0 -2.5 2.5
      v 14
      a 2.5 2.5 0 0 0 2.5 2.5
      h 12
  " mask="url(#bookmarkMask)"/>
  <path class="border" d="
      M 4.75 19.0
      a 2.5 2.5 0 0 1 2.5 -2.5
      h 12
  "/>
  <path class="border" d="
      M 19.25 2.5
      v 14
  "/>
  <path d="
      M 7.25 19.0
      h 12
  "/>
  <path d="
    M 11 2.0
    a 1 1 0 0 1 1 1
     v 8 l 2 -2 l 2 2 v -8
    a 1 1 0 0 0 -1 -1
  "/>

  <!-- [[[end]]] -->
  
