<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

  <style>
    body {
      padding: 1em;
      display: grid;
      height: 100vh;
    }
    
    #viewfinder {
      width: 60%;
      margin: auto;
      margin-top: 2em;
    }

    #buttons {
      margin-block: 1rem;
      position: relative;
      margin: auto;
      bottom: 40px;
      text-align: center;
    }
    
    button {
      height: 30px;
    }

    #start-button, #permissions-button, #change-colour {
      display: inline-block;
      background-color: rgb(220 220 220 / 70%);
      border: 1px solid rgb(255 255 255 / 70%);
      box-shadow: 0px 0px 1px 2px rgb(0 0 0 / 20%);
      font-size: 14px;
      color: black;
    }

    #video,
    #photo {
      border: 1px solid black;
      box-shadow: 2px 2px 3px black;
      width: 100%;
      height: auto;
    }
    
    #video {
      background: white;
    }
    
    #video {
      /* https://stackoverflow.com/questions/14455844/is-that-possible-to-make-video-mirrored */
      transform: rotateY(180deg);
      -webkit-transform:rotateY(180deg); /* Safari and Chrome */
      -moz-transform:rotateY(180deg); /* Firefox */
    }

    #canvas {
      display: none;
    }

    .camera {
      display: inline-block;
      width: 74%;
      height: auto;
    }
    .output {
      display: inline-block;
      width: 24%;
      height: auto;
    }

    .output {
      vertical-align: top;
    }
  </style>
</head>

<body>
  
  <div id="viewfinder">
    <div class="camera">
      <video id="video">Video stream not available.</video>
      <div id="buttons">
        <button id="permissions-button">Allow camera</button>
        <button id="start-button">Capture photo</button>
        <button id="change-colour" disabled>
          <label for="bgcolour">Change colour</label>
          <input type="color" id="bgcolour"/>
        </button>
        
      </div>
    </div>
    <canvas id="canvas"></canvas>
    <div class="output">
      <img id="photo" src="" alt="The screen capture will appear in this box." />
    </div>
  </div>
  
  <script>
    let width = 320;
    let height = 0;

    let streaming = false;

    const video = document.getElementById("video");
    const canvas = document.getElementById("canvas");
    const photo = document.getElementById("photo");
    const startButton = document.getElementById("start-button");
    const permissionsButton = document.getElementById("permissions-button");
    const colourPicker = document.getElementById("bgcolour");
    permissionsButton.addEventListener("click", () => {
      navigator.mediaDevices
        .getUserMedia({ video: true, audio: false })
        .then((stream) => {
          video.srcObject = stream;
          video.play();
        })
        .catch((err) => {
          console.error(`An error occurred: ${err}`);
        });
    });
    colourPicker.addEventListener("change", () => {
      document.querySelector("body").style.background = colourPicker.value;
    });
    window.addEventListener("DOMContentLoaded", () => {
      const colour = `hsl(${Math.random() * 255} 100% 50%)`;
      document.querySelector("body").style.background = colour;
      colourPicker.value = colour;
    })
    video.addEventListener("canplay", (ev) => {
      if (!streaming) {
        width = video.videoWidth;
        height = video.videoHeight;

        video.setAttribute("width", width);
        video.setAttribute("height", height);
        canvas.setAttribute("width", width);
        canvas.setAttribute("height", height);
        streaming = true;
      }
    });
    startButton.addEventListener("click", (ev) => {
      takePicture();
      ev.preventDefault();
    });
    function clearPhoto() {
      const context = canvas.getContext("2d");
      context.fillStyle = "#aaaaaa00";
      context.fillRect(0, 0, canvas.width, canvas.height);

      const data = canvas.toDataURL("image/png");
      photo.setAttribute("src", data);
    }

    clearPhoto();
    function takePicture() {
      const context = canvas.getContext("2d");
      if (width && height) {
        canvas.width = width;
        canvas.height = height;

        /* flip horizontally */
        context.translate(width, 0);
        context.scale(-1, 1);

        context.drawImage(video, 0, 0, width, height);

        const data = canvas.toDataURL("image/png");
        photo.setAttribute("src", data);
      } else {
        clearPhoto();
      }
    }
  </script>
</body>

</html>
