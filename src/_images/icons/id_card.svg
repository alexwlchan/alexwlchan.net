<svg viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"  xmlns:xlink="http://www.w3.org/1999/xlink">
      <!--[[[cog
      import cog
  
      r = 3
      WIDTH = HEIGHT = 24
  
      e_width = 22
      e_height = 15
      
      clip_height = 3
      clip_width = 6
  
      x = (WIDTH - e_width) / 2
      y = (HEIGHT - e_height - clip_height) / 2
  
  
  
      border = f"""
                 M {x} {y + r + clip_height}
                 a {r} {r} 0 0 1 {r} {-r}
                 h {e_width - 2 * r}
                 a {r} {r} 0 0 1 {r} {r}
                 v {e_height - 2 * r}
                 a {r} {r} 0 0 1 {-r} {r}
                 h {-e_width + 2 *r}
                 a {r} {r} 0 0 1 {-r} {-r}
                 v {-e_height + 2*r}
      """
      
      cog.outl(f'''
      <defs>
        <mask id="halfRect">
          <rect width="24" height="24" fill="white"/>
          <rect width="24" height="24" y="{HEIGHT/2+5}" fill="black"/>
        </mask>
      </defs>
      ''')
      
      cog.outl(f'''
      <path class="border" d="M {(WIDTH - clip_width) / 2} {y+clip_height} v{-clip_height + 1} a 1 1 0 0 1 1 -1 h {clip_width - 2} a 1 1 0 0 1 1 1 v {clip_height - 1}"/>
      ''')
  
      cog.outl(f'<path d="{border.strip()}" class="border"/>')
      cog.outl(f'<circle cx="8" cy="{HEIGHT/2 - 0.25}" r="1.75"/>')
      cog.outl(f'<ellipse cx="8" cy="{HEIGHT/2 + 5}" rx="3" ry="3" mask="url(#halfRect)"/>')
      cog.outl(f'<path d="M 14 10.25 h 5"/>')
      cog.outl(f'<path d="M 14 13.25 h 5"/>')
      cog.outl(f'<path d="M 14 16.25 h 5"/>')
      ]]]-->

      <defs>
        <mask id="halfRect">
          <rect width="24" height="24" fill="white"/>
          <rect width="24" height="24" y="17.0" fill="black"/>
        </mask>
      </defs>


      <path class="border" d="M 9.0 6.0 v-2 a 1 1 0 0 1 1 -1 h 4 a 1 1 0 0 1 1 1 v 2"/>

      <path d="M 1.0 9.0
                 a 3 3 0 0 1 3 -3
                 h 16
                 a 3 3 0 0 1 3 3
                 v 9
                 a 3 3 0 0 1 -3 3
                 h -16
                 a 3 3 0 0 1 -3 -3
                 v -9" class="border"/>
      <circle cx="8" cy="11.75" r="1.75"/>
      <ellipse cx="8" cy="17.0" rx="3" ry="3" mask="url(#halfRect)"/>
      <path d="M 14 10.25 h 5"/>
      <path d="M 14 13.25 h 5"/>
      <path d="M 14 16.25 h 5"/>
  <!-- [[[end]]] -->
</svg>