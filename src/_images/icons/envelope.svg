<svg viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"  xmlns:xlink="http://www.w3.org/1999/xlink">
  <!--[[[cog
  import cog
  
  r = 3
  WIDTH = HEIGHT = 24
  
  e_width = 18
  e_height = 13
  
  x = (WIDTH - e_width) / 2
  y = (HEIGHT - e_height) / 2
  
  
  
  border = f"""
             M {x} {y + r}
             a {r} {r} 0 0 1 {r} {-r}
             h {e_width - 2 * r}
             a {r} {r} 0 0 1 {r} {r}
             v {e_height - 2 * r}
             a {r} {r} 0 0 1 {-r} {r}
             h {-e_width + 2 *r}
             a {r} {r} 0 0 1 {-r} {-r}
             v {-e_height + 2*r}
  """
  
  cog.outl(f'''
  <defs>
    <mask id="envelopeOutline">
      <rect width="24" height="24" fill="black"/>
      <path d="{border.strip()}" style="fill: white"/>
    </mask>
  </defs>
  ''')
  
  cog.outl(f'<path d="{border.strip()}" class="border"/>')
  cog.outl(f'<path d="M {x} {y} L {x+5} {y+6} A 5 5 0 0 0 {WIDTH-x-5} {y+6} L {x+e_width} {y}" mask="url(#envelopeOutline)"/>')
  cog.outl(f'<path d="M {x} {y+e_height} l 5.5 -5.5" mask="url(#envelopeOutline)"/>')
  cog.outl(f'<path d="M {x+e_width} {y+e_height} l -5.5 -5.5" mask="url(#envelopeOutline)"/>')
  ]]]-->

  <defs>
    <mask id="envelopeOutline">
      <rect width="24" height="24" fill="black"/>
      <path d="M 3.0 8.5
             a 3 3 0 0 1 3 -3
             h 12
             a 3 3 0 0 1 3 3
             v 7
             a 3 3 0 0 1 -3 3
             h -12
             a 3 3 0 0 1 -3 -3
             v -7" style="fill: white"/>
    </mask>
  </defs>

  <path d="M 3.0 8.5
             a 3 3 0 0 1 3 -3
             h 12
             a 3 3 0 0 1 3 3
             v 7
             a 3 3 0 0 1 -3 3
             h -12
             a 3 3 0 0 1 -3 -3
             v -7" class="border"/>
  <path d="M 3.0 5.5 L 8.0 11.5 A 5 5 0 0 0 16.0 11.5 L 21.0 5.5" mask="url(#envelopeOutline)"/>
  <path d="M 3.0 18.5 l 5.5 -5.5" mask="url(#envelopeOutline)"/>
  <path d="M 21.0 18.5 l -5.5 -5.5" mask="url(#envelopeOutline)"/>
  <!-- [[[end]]] -->
 <!-- <path d="M 4 6 L 20 18" style="stroke: red;"/> -->
</svg>